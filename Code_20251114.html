<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击图片跳转 WhatsApp</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .jump-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .jump-img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <a href="https://wa.me/85247659005" target="_blank" rel="noopener noreferrer">
        <img src="https://i.imgur.com/4Z7XZ7H.jpg" alt="点击联系WhatsApp" class="jump-img">
    </a>
</body>
</html>
